<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Nota Penjualan</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h2 id="toko">TOKO ANDA</h2>

<div class="info">
<div id="tanggal"></div>
<div>No : <span id="trx"></span></div>
</div>

<input id="barang" placeholder="Nama barang">
<input id="harga" type="number" placeholder="Harga">
<input id="qty" type="number" placeholder="Qty">

<button onclick="tambah()">Tambah</button>

<table id="tabel">

<tr>
<th>Barang</th>
<th>Harga</th>
<th>Qty</th>
<th>Total</th>
<th></th>
</tr>

</table>

<div class="total">
Total : Rp <span id="total">0</span>
</div>

<div class="menu">

<button onclick="printNota()">Print</button>
<button onclick="shareNota()">Share</button>
<button onclick="simpan()">Simpan</button>

</div>

<h3>Riwayat</h3>

<div id="riwayat"></div>

</div>

<script src="app.js"></script>

</body>
</html>
