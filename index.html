<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nota Penjualan</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<div class="app">

<div class="header">
<h2>Nota Penjualan</h2>
<div id="tanggal"></div>
<div>No: <span id="trx"></span></div>
</div>

<div class="card">

<input id="barang" placeholder="Nama barang">

<div class="row">

<input id="harga" type="number" placeholder="Harga">

<input id="qty" type="number" placeholder="Qty">

</div>

<button class="btnTambah" onclick="tambah()">Tambah Barang</button>

</div>

<div class="card">

<table id="tabel">

<tr>
<th>Barang</th>
<th>Harga</th>
<th>Qty</th>
<th>Total</th>
<th></th>
</tr>

</table>

<div class="total">

Total : Rp <span id="total">0</span>

</div>

</div>

<div class="menu">

<button class="btnPrint" onclick="printNota()">Print</button>

<button class="btnShare" onclick="sharePDF()">Share PDF</button>

<button class="btnSave" onclick="simpan()">Simpan</button>

</div>

<div class="riwayat">

<h3>Riwayat</h3>

<div id="riwayat"></div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
